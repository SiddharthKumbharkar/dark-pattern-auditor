<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Cart - ShopDemo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div>ShopDemo</div>
  <a href="cart.html">Cart (2)</a>
</header>

<main>
  <h1>Your Cart</h1>

  <table class="cart-table">
    <tr>
      <th>Item</th>
      <th>Qty</th>
      <th>Price</th>
    </tr>
    <tr>
      <td>Wireless Earbuds Pro</td>
      <td>1</td>
      <td>₹2,499</td>
    </tr>
    <tr>
      <td>Extended Warranty Plan <span class="subtext">(auto-added)</span></td>
      <td>1</td>
      <td>₹399</td>
    </tr>
    <tr>
      <td><strong>Subtotal</strong></td>
      <td></td>
      <td><strong>₹2,898</strong></td>
    </tr>
  </table>

  <div class="button-row">
    <button class="btn-keep">Keep Warranty Plan</button>
    <button class="btn-remove">remove</button>
  </div>

  <div class="right-align">
    <a href="checkout.html" class="cta-button">Proceed to Checkout</a>
  </div>
</main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout - ShopDemo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div>ShopDemo</div>
  <a href="cart.html">Cart (2)</a>
</header>

<main>
  <h1>Checkout</h1>

  <table class="cart-table">
    <tr>
      <td>Wireless Earbuds Pro</td>
      <td>₹2,499</td>
    </tr>
    <tr>
      <td>Extended Warranty Plan</td>
      <td>₹399</td>
    </tr>
    <tr>
      <td>Handling &amp; Packaging Fee <span class="subtext">(new charge added at this step)</span></td>
      <td>₹149</td>
    </tr>
    <tr>
      <td><strong>Total</strong></td>
      <td><strong>₹3,047</strong></td>
    </tr>
  </table>

  <label>
    <input type="checkbox">
    I do not want to NOT receive marketing emails
  </label>

  <div class="right-align">
    <button class="cta-button">Place Order</button>
  </div>

  <p class="fine-print">
    Order is final upon confirmation. Handling fee is
    non-refundable. See full Terms.
  </p>
</main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout - HomeGoods Co</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div>HomeGoods Co</div>
  <a href="cart.html">Cart (1)</a>
</header>

<main>
  <h1>Checkout</h1>

  <table class="cart-table">
    <tr>
      <td>Ceramic Coffee Mug Set (Set of 4)</td>
      <td>₹1,099</td>
    </tr>
    <tr>
      <td>Shipping</td>
      <td>Free</td>
    </tr>
    <tr>
      <td>Taxes (included)</td>
      <td>₹0 additional</td>
    </tr>
    <tr>
      <td><strong>Total</strong></td>
      <td><strong>₹1,099</strong></td>
    </tr>
  </table>

  <label>
    <input type="checkbox">
    Send me occasional emails about new products and offers (optional)
  </label>

  <div class="right-align">
    <button class="cta-button">Place Order</button>
  </div>

  <p class="fine-print">
    You can cancel or return this order within 30 days for a
    full refund. No additional fees will be charged beyond the total shown above.
  </p>
</main>
</body>
</html>
